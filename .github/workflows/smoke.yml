name: Smoke Tests

# Docker integration tests — run on merge to main only.
# Verifies container isolation properties on a clean machine.

on:
  push:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Configure git for CI
        run: |
          git config --global user.name "CI Test"
          git config --global user.email "ci@test.local"
          git config --global init.defaultBranch main

      - name: Initialize alcatrazer environment
        run: ./src/alcatrazer/scripts/initialize_alcatraz.sh --non-interactive

      - name: Build Docker image
        run: docker compose --env-file .env -f src/alcatrazer/container/docker-compose.yml build

      - name: Run smoke tests
        run: python -m unittest discover -s src/alcatrazer/integration_tests -v
