name: Smoke Tests

# Docker integration tests — run on merge to main only.
# Verifies container isolation properties on a clean machine.
#
# TODO: initialize_alcatraz.sh delegates to init.py which has interactive
# workspace selection prompts. This workflow will need either:
# - A --non-interactive / --ci flag that picks defaults automatically
# - Or manual bootstrapping steps that replicate what init.py does
# For now this is a draft — will iterate once ci.yml is proven green.

on:
  push:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bootstrap alcatrazer environment
        run: |
          mkdir -p .alcatrazer
          ln -s "$(which python3)" .alcatrazer/python

          # Phantom UID — pick first unused UID starting at 1001
          USER_UID=1001
          while getent passwd "$USER_UID" >/dev/null 2>&1; do
            USER_UID=$((USER_UID + 1))
          done
          echo "$USER_UID" > .alcatrazer/uid
          echo "USER_UID=$USER_UID" > .env

          # Workspace directory — generate non-interactively
          PYTHONPATH=src python -c "
          from alcatrazer.identity import generate_workspace_dir_name, store_workspace_dir, ensure_identity
          import os
          workspace_name = generate_workspace_dir_name()
          store_workspace_dir('.alcatrazer', workspace_name)
          os.makedirs(workspace_name, exist_ok=True)
          ensure_identity('.alcatrazer')
          print(f'Workspace: {workspace_name}')
          "
          WORKSPACE_DIR=$(cat .alcatrazer/workspace-dir)
          echo "WORKSPACE_DIR=$WORKSPACE_DIR" >> .env

          # Init workspace git repo with agent identity
          AGENT_NAME=$(head -1 .alcatrazer/agent-identity)
          AGENT_EMAIL=$(tail -1 .alcatrazer/agent-identity)
          git init "$WORKSPACE_DIR"
          git -C "$WORKSPACE_DIR" config user.name "$AGENT_NAME"
          git -C "$WORKSPACE_DIR" config user.email "$AGENT_EMAIL"

          # Snapshot outer repo into workspace
          PYTHONPATH=src python -c "
          from alcatrazer.snapshot import snapshot_workspace
          snapshot_workspace('.', '$WORKSPACE_DIR', '.alcatrazer')
          "

          # safe.directory for phantom-UID-owned workspace
          git config --global --add safe.directory "$(pwd)/$WORKSPACE_DIR"

      - name: Build Docker image
        run: docker compose -f src/alcatrazer/container/docker-compose.yml build

      - name: Run smoke tests
        run: python -m unittest discover -s src/alcatrazer/integration_tests -v
