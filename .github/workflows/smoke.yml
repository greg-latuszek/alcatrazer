name: Smoke Tests

# Docker integration tests — run on merge to main only.
# Verifies container isolation properties on a clean machine.

on:
  push:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Configure git for CI
        run: |
          git config --global user.name "CI Test"
          git config --global user.email "ci@test.local"
          git config --global init.defaultBranch main

      - name: Initialize alcatrazer environment
        run: ./src/alcatrazer/scripts/initialize_alcatraz.sh --non-interactive

      - name: Build Docker image
        run: |
          docker build \
            --build-arg USER_UID=$(cat .alcatrazer/uid) \
            -f src/alcatrazer/container/Dockerfile \
            -t workspace \
            .

      - name: Generate docker-compose.yml at project root
        run: |
          # Smoke tests use `docker compose run` via the compose file.
          # The template in src/alcatrazer/container/ has ../../../ paths
          # that break .env resolution. Generate a working copy at project root.
          # Proper templating comes with install_method feature.
          sed -e 's|context: \.\./\.\./\.\.|context: .|' \
              -e 's|\.\./\.\./\.\./||g' \
              src/alcatrazer/container/docker-compose.yml > docker-compose.yml

      - name: Debug - dump generated docker-compose.yml
        run: cat docker-compose.yml

      - name: Debug - dump .env
        run: cat .env

      - name: Debug - verify docker image exists
        run: docker images workspace

      - name: Debug - test container with docker run
        run: |
          WORKSPACE_DIR=$(cat .alcatrazer/workspace-dir)
          docker run --rm \
            -v "$(pwd)/$WORKSPACE_DIR:/workspace" \
            workspace bash -c '
              echo "=== pwd ==="
              pwd
              echo "=== ls -la /workspace ==="
              ls -la /workspace
              echo "=== ls -la ~ ==="
              ls -la ~
              echo "=== id ==="
              id
              echo "=== whoami ==="
              whoami
              echo "=== python --version ==="
              python --version 2>&1
              echo "=== git --version ==="
              git --version 2>&1
            '

      - name: Debug - test docker compose run
        run: |
          docker compose run --rm workspace bash -c 'echo "compose run works"; id' 2>&1 || true

      - name: Run smoke tests
        run: python -m unittest discover -s src/alcatrazer/integration_tests -v
