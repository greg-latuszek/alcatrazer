# Configuration:
#   .env — API keys, USER_UID, WORKSPACE_DIR (managed by init script and user)
#
# Run from project root: docker compose -f container/docker-compose.yml ...

services:
  alcatraz:
    build:
      context: ..
      dockerfile: container/Dockerfile
      target: alcatraz-dev
      args:
        USER_UID: ${USER_UID:?Run initialization first (see README)}
        PYTHON_VERSION: ${PYTHON_VERSION:-3.13}
        NODE_VERSION: ${NODE_VERSION:-22}
        BUN_VERSION: ${BUN_VERSION:-latest}
    container_name: agent-alcatraz
    volumes:
      # Mount the workspace directory (separate from .alcatrazer/, randomly named)
      # WORKSPACE_DIR is set in .env by the init script
      - ../${WORKSPACE_DIR:?Run initialization first (see README)}:/workspace
      # Claude Code OAuth credentials (read-only, just the credentials file,
      # not the whole ~/.claude/ directory which may contain project memories/settings)
      - ~/.claude/.credentials.json:/home/agent/.claude/.credentials.json:ro
      # Persistent caches to avoid re-downloading on container restart
      - mise-cache:/home/agent/.local/share/mise
      - pip-cache:/home/agent/.cache/pip
      - npm-cache:/home/agent/.npm
      - bun-cache:/home/agent/.bun/install/cache
    env_file:
      - ../.env
    stdin_open: true
    tty: true

volumes:
  mise-cache:
  pip-cache:
  npm-cache:
  bun-cache: