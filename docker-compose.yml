# All configuration lives in .env (created by initialize_alcatraz.sh from .env.example).
# Docker compose auto-reads .env for variable interpolation and runtime env vars.

services:
  alcatraz:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ALCATRAZ_UID: ${ALCATRAZ_UID:?Run ./initialize_alcatraz.sh first}
    container_name: agent-alcatraz
    volumes:
      # Mount the inner Alcatraz repo as the agent workspace
      - ./.alcatraz:/workspace
      # Claude Code OAuth credentials (read-only, just the credentials file,
      # not the whole ~/.claude/ directory which may contain project memories/settings)
      - ~/.claude/.credentials.json:/home/agent/.claude/.credentials.json:ro
      # Persistent caches to avoid re-downloading on container restart
      - mise-cache:/home/agent/.local/share/mise
      - pip-cache:/home/agent/.cache/pip
      - npm-cache:/home/agent/.npm
      - bun-cache:/home/agent/.bun/install/cache
    env_file:
      - .env
    stdin_open: true
    tty: true

volumes:
  mise-cache:
  pip-cache:
  npm-cache:
  bun-cache: